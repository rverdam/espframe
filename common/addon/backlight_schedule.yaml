# =============================================================================
# BACKLIGHT SCHEDULE & DAY/NIGHT BRIGHTNESS
# =============================================================================
# Scheduled true display-off, temporary touch wake during off-hours, automatic
# day/night brightness based on sunrise/sunset calculation, and manual
# long-press sleep.
# =============================================================================

globals:
  - id: backlight_paused
    type: bool
    initial_value: 'false'
  - id: touch_started_while_off
    type: bool
    initial_value: 'false'
  - id: wake_touch_ms
    type: uint32_t
    initial_value: '0'
  - id: sunrise_hour
    type: int
    initial_value: '6'
  - id: sunrise_minute
    type: int
    initial_value: '0'
  - id: sunset_hour
    type: int
    initial_value: '18'
  - id: sunset_minute
    type: int
    initial_value: '0'
  - id: sunrise_sunset_valid
    type: bool
    initial_value: 'false'
  - id: last_is_daytime
    type: bool
    initial_value: 'true'

esphome:
  on_boot:
    priority: -250
    then:
      - script.execute: screen_schedule_boot_guard

# =============================================================================
# USER-CONFIGURABLE ENTITIES
# =============================================================================

switch:
  - platform: template
    name: "Screen: Schedule Enabled"
    id: schedule_enabled
    internal: true
    optimistic: true
    # ESPFRAME:SETTING_FIELDS schedule_enabled START
    restore_mode: RESTORE_DEFAULT_OFF
    # ESPFRAME:SETTING_FIELDS schedule_enabled END
    icon: "mdi:calendar-clock"
    web_server:
      sorting_group_id: sg_screen
    on_turn_on:
      then:
        - script.execute: screen_schedule_check
    on_turn_off:
      then:
        - script.stop: screen_schedule_wake_timeout_check
        - globals.set:
            id: screen_schedule_asleep
            value: 'false'
        - globals.set:
            id: screensaver_display_off_active
            value: 'false'
        - globals.set:
            id: backlight_manual_off
            value: 'false'
        - globals.set:
            id: manual_wake_ms
            value: '0'
        - if:
            condition:
              lambda: 'return id(backlight_paused);'
            then:
              - globals.set:
                  id: backlight_paused
                  value: 'false'
              - script.execute: screen_schedule_restore_page
              - script.execute: backlight_apply_brightness
              - script.execute: immich_prefetch_chain
            else:
              - script.execute: backlight_apply_brightness

number:
  - platform: template
    name: "Screen: Schedule On Hour"
    id: schedule_on_hour
    internal: true
    # ESPFRAME:SETTING_FIELDS schedule_on_hour START
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS schedule_on_hour END
    unit_of_measurement: "h"
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "Screen: Schedule Off Hour"
    id: schedule_off_hour
    internal: true
    # ESPFRAME:SETTING_FIELDS schedule_off_hour START
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 23
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS schedule_off_hour END
    unit_of_measurement: "h"
    icon: "mdi:weather-night"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: screen_schedule_check

  - platform: template
    name: "Screen: Schedule Wake Timeout"
    id: schedule_wake_timeout
    internal: true
    # ESPFRAME:SETTING_FIELDS schedule_wake_timeout START
    min_value: 10
    max_value: 3600
    step: 10
    initial_value: 60
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS schedule_wake_timeout END
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(manual_wake_ms) != 0;'
            then:
              - script.execute: screen_schedule_wake_timeout_check

  - platform: template
    name: "Screen: Daytime Brightness"
    id: brightness_day
    internal: true
    # ESPFRAME:SETTING_FIELDS brightness_day START
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 100
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS brightness_day END
    unit_of_measurement: "%"
    icon: "mdi:brightness-7"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_apply_brightness

  - platform: template
    name: "Screen: Nighttime Brightness"
    id: brightness_night
    internal: true
    # ESPFRAME:SETTING_FIELDS brightness_night START
    min_value: 10
    max_value: 100
    step: 5
    initial_value: 75
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS brightness_night END
    unit_of_measurement: "%"
    icon: "mdi:brightness-4"
    web_server:
      sorting_group_id: sg_screen
    on_value:
      then:
        - script.execute: backlight_apply_brightness

# Sunrise/sunset times for dashboard display only; internal = not exposed to Home Assistant
text_sensor:
  - platform: template
    name: "Screen: Sunrise"
    id: sunrise_time_sensor
    internal: true
    entity_category: diagnostic
    icon: "mdi:weather-sunset-up"
    web_server:
      sorting_group_id: sg_screen

  - platform: template
    name: "Screen: Sunset"
    id: sunset_time_sensor
    internal: true
    entity_category: diagnostic
    icon: "mdi:weather-sunset-down"
    web_server:
      sorting_group_id: sg_screen

# =============================================================================
# SCRIPTS
# =============================================================================

script:
  # Keep the backlight dark after reboot until valid time confirms the schedule.
  - id: screen_schedule_boot_guard
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: schedule_enabled
          then:
            - globals.set:
                id: backlight_paused
                value: 'true'
            - globals.set:
                id: screensaver_display_off_active
                value: 'true'
            - globals.set:
                id: screen_schedule_asleep
                value: 'true'
            - globals.set:
                id: backlight_manual_off
                value: 'false'
            - globals.set:
                id: manual_wake_ms
                value: '0'
            - script.execute: backlight_schedule_display_off
          else:
            - if:
                condition:
                  lambda: 'return id(backlight_manual_off);'
                then:
                  - globals.set:
                      id: backlight_paused
                      value: 'true'
                  - globals.set:
                      id: screensaver_display_off_active
                      value: 'true'
                  - globals.set:
                      id: screen_schedule_asleep
                      value: 'false'
                  - globals.set:
                      id: manual_wake_ms
                      value: '0'
                  - script.execute: backlight_schedule_display_off
                else:
                  - globals.set:
                      id: screen_schedule_asleep
                      value: 'false'

  # Restore the right visible page after waking from the black screen-off page.
  - id: screen_schedule_restore_page
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return lv_scr_act() == id(screen_off_page)->obj;'
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  - if:
                      condition:
                        lambda: 'return !id(immich_url).state.empty() && !id(immich_api_key_text).state.empty();'
                      then:
                        - lvgl.page.show: slideshow_page
                      else:
                        - lvgl.page.show: immich_setup_page
                else:
                  - lvgl.page.show: wifi_setup_page

  # Force the screen asleep because it is outside schedule hours.
  - id: screen_schedule_sleep
    mode: restart
    then:
      - script.stop: screen_schedule_wake_timeout_check
      - globals.set:
          id: backlight_paused
          value: 'true'
      - globals.set:
          id: screensaver_display_off_active
          value: 'true'
      - globals.set:
          id: screen_schedule_asleep
          value: 'true'
      - globals.set:
          id: backlight_manual_off
          value: 'false'
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - lambda: 'global_preferences->sync();'
      - script.execute: backlight_schedule_display_off

  # Wake automatically at the start of the schedule window.
  - id: screen_schedule_wake
    mode: restart
    then:
      - script.stop: screen_schedule_wake_timeout_check
      - globals.set:
          id: screen_schedule_asleep
          value: 'false'
      - globals.set:
          id: screensaver_display_off_active
          value: 'false'
      - globals.set:
          id: backlight_manual_off
          value: 'false'
      - globals.set:
          id: manual_wake_ms
          value: '0'
      - globals.set:
          id: backlight_paused
          value: 'false'
      - lambda: |-
          id(last_photo_displayed_ms) = millis();
          global_preferences->sync();
      - lvgl.resume:
      - script.execute: screen_schedule_restore_page
      - delay: 100ms
      - script.execute: backlight_apply_brightness
      - script.execute: immich_prefetch_chain

  # Apply the saved screen schedule if local time is valid.
  - id: screen_schedule_check
    mode: restart
    then:
      - lambda: |-
          if (!id(schedule_enabled).state) return;

          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int on_hour = (int) id(schedule_on_hour).state;
          int off_hour = (int) id(schedule_off_hour).state;
          if (on_hour < 0) on_hour = 0;
          if (on_hour > 23) on_hour = 23;
          if (off_hour < 0) off_hour = 0;
          if (off_hour > 23) off_hour = 23;

          bool in_window = true;
          if (on_hour < off_hour) {
            in_window = now.hour >= on_hour && now.hour < off_hour;
          } else if (on_hour > off_hour) {
            in_window = now.hour >= on_hour || now.hour < off_hour;
          }

          if (in_window) {
            id(manual_wake_ms) = 0;
            if (id(screen_schedule_asleep) && !id(backlight_manual_off)) {
              id(screen_schedule_wake).execute();
            }
            return;
          }

          if (id(manual_wake_ms) != 0) {
            uint32_t elapsed = (uint32_t) (millis() - id(manual_wake_ms));
            float timeout_s = id(schedule_wake_timeout).state;
            if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
            if (timeout_s < 10) timeout_s = 10;
            if (timeout_s > 3600) timeout_s = 3600;
            uint32_t timeout_ms = (uint32_t) (timeout_s * 1000.0f);
            if (elapsed < timeout_ms) return;
            id(manual_wake_ms) = 0;
          }

          if (id(screen_schedule_asleep)) {
            id(backlight_schedule_display_off).execute();
          } else {
            id(screen_schedule_sleep).execute();
          }

  # Put the screen back to sleep after a temporary off-hours wake.
  - id: screen_schedule_wake_timeout_check
    mode: restart
    then:
      - delay: !lambda |-
          float timeout_s = id(schedule_wake_timeout).state;
          if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
          if (timeout_s < 10) timeout_s = 10;
          if (timeout_s > 3600) timeout_s = 3600;
          return (int) (timeout_s * 1000.0f);
      - lambda: |-
          if (!id(schedule_enabled).state || id(manual_wake_ms) == 0 ||
              id(backlight_manual_off)) {
            return;
          }

          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          int on_hour = (int) id(schedule_on_hour).state;
          int off_hour = (int) id(schedule_off_hour).state;
          if (on_hour < 0) on_hour = 0;
          if (on_hour > 23) on_hour = 23;
          if (off_hour < 0) off_hour = 0;
          if (off_hour > 23) off_hour = 23;

          bool in_window = true;
          if (on_hour < off_hour) {
            in_window = now.hour >= on_hour && now.hour < off_hour;
          } else if (on_hour > off_hour) {
            in_window = now.hour >= on_hour || now.hour < off_hour;
          }
          if (in_window) {
            id(manual_wake_ms) = 0;
            return;
          }

          float timeout_s = id(schedule_wake_timeout).state;
          if (std::isnan(timeout_s) || timeout_s <= 0) timeout_s = 60;
          if (timeout_s < 10) timeout_s = 10;
          if (timeout_s > 3600) timeout_s = 3600;
          uint32_t timeout_ms = (uint32_t) (timeout_s * 1000.0f);
          uint32_t elapsed = (uint32_t) (millis() - id(manual_wake_ms));
          if (elapsed >= timeout_ms && !id(screen_schedule_asleep)) {
            id(manual_wake_ms) = 0;
            id(screen_schedule_sleep).execute();
          }

  # Determine correct brightness and apply it.
  - id: backlight_apply_brightness
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              return id(backlight_paused) || id(screen_schedule_asleep) ||
                     id(backlight_manual_off) ||
                     (id(schedule_enabled).state && !now.is_valid());
          then:
            - script.execute: backlight_force_display_off
          else:
            - lvgl.resume:
            - lambda: |-
                auto now = id(sntp_time).now();
                float pct;
                if (id(sunrise_sunset_valid) && now.is_valid()) {
                  bool is_day = is_daytime(now.hour, now.minute,
                                           id(sunrise_hour), id(sunrise_minute),
                                           id(sunset_hour), id(sunset_minute));
                  id(last_is_daytime) = is_day;
                  pct = is_day ? id(brightness_day).state : id(brightness_night).state;
                } else {
                  pct = id(brightness_day).state;
                }

                id(screen_schedule_restore_page).execute();
                id(backlight_paused) = false;
                id(screensaver_display_off_active) = false;
                float brightness = pct / 100.0f;
                auto call = id(backlight).turn_on();
                call.set_brightness(brightness);
                call.set_transition_length(500);
                call.perform();

  # Recalculate sunrise/sunset from timezone coordinates and current date.
  - id: backlight_recalc_sunrise_sunset
    mode: single
    then:
      - lambda: |-
          auto now = id(sntp_time).now();
          if (!now.is_valid()) return;

          std::string tz_full = id(timezone_select).current_option();
          std::string tz_id = tz_full.substr(0, tz_full.find(" ("));
          float fallback_tz_offset = parse_tz_offset(tz_full);
          float tz_offset = fallback_tz_offset;

          auto local_noon = now;
          local_noon.hour = 12;
          local_noon.minute = 0;
          local_noon.second = 0;
          local_noon.recalc_timestamp_local();
          if (local_noon.timestamp >= 0) {
            tz_offset = active_tz_offset_hours(local_noon.timestamp, fallback_tz_offset);
          }

          float lat, lon;
          if (!lookup_tz_coords(tz_id, lat, lon)) {
            ESP_LOGW("backlight", "No coordinates for timezone %s", tz_id.c_str());
            id(sunrise_sunset_valid) = false;
            return;
          }

          int rh, rm, sh, sm;
          calc_sunrise_sunset(now.year, now.month, now.day_of_month,
                              lat, lon, tz_offset, rh, rm, sh, sm);

          id(sunrise_hour) = rh;
          id(sunrise_minute) = rm;
          id(sunset_hour) = sh;
          id(sunset_minute) = sm;
          id(sunrise_sunset_valid) = true;

          id(sunrise_time_sensor).publish_state(format_time_12h(rh, rm));
          id(sunset_time_sensor).publish_state(format_time_12h(sh, sm));

          // Integer-only log: avoids newlib float formatting (_dtoa_r) during heap work under load.
          float alat = lat >= 0 ? lat : -lat;
          float alon = lon >= 0 ? lon : -lon;
          float atz = tz_offset >= 0 ? tz_offset : -tz_offset;
          int lat_c = (int)(alat * 100.0f + 0.5f);
          int lon_c = (int)(alon * 100.0f + 0.5f);
          int tz_c = (int)(atz * 10.0f + 0.5f);
          ESP_LOGI("backlight", "Sunrise %02d:%02d, Sunset %02d:%02d (lat=%s%d.%02d lon=%s%d.%02d tz=%s%d.%d)",
                   rh, rm, sh, sm,
                   lat < 0 ? "-" : "", lat_c / 100, lat_c % 100,
                   lon < 0 ? "-" : "", lon_c / 100, lon_c % 100,
                   tz_offset < 0 ? "-" : "", tz_c / 10, tz_c % 10);

          id(backlight_apply_brightness).execute();

  # 3-second hold timer: manual display-off until the next touch.
  - id: backlight_hold_timer
    mode: restart
    then:
      - delay: 3s
      - logger.log:
          level: INFO
          tag: backlight
          format: "Manual off via 3s hold"
      - script.execute: screen_schedule_manual_sleep

  # Wake from manual or scheduled display-off.
  - id: backlight_wake
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              if (id(schedule_enabled).state && !now.is_valid()) return true;
              if (id(backlight_paused) || id(screen_schedule_asleep) ||
                  id(screensaver_display_off_active) ||
                  !id(backlight).current_values.is_on()) {
                return true;
              }

              float target = id(brightness_day).state / 100.0f;
              if (id(sunrise_sunset_valid) && now.is_valid()) {
                bool is_day = is_daytime(now.hour, now.minute,
                                         id(sunrise_hour), id(sunrise_minute),
                                         id(sunset_hour), id(sunset_minute));
                target = (is_day ? id(brightness_day).state : id(brightness_night).state) / 100.0f;
              }
              float diff = id(backlight).current_values.get_brightness() - target;
              if (diff < 0) diff = -diff;
              return diff > 0.01f;
          then:
            - script.stop: screen_schedule_sleep
            - script.stop: backlight_schedule_display_off
            - lambda: |-
                auto now = id(sntp_time).now();
                bool was_off = id(backlight_paused) || id(screen_schedule_asleep) ||
                               id(screensaver_display_off_active) ||
                               !id(backlight).current_values.is_on();
                if (was_off) {
                  id(touch_started_while_off) = true;
                  id(wake_touch_ms) = millis();
                }

                if (id(schedule_enabled).state && !now.is_valid()) {
                  id(backlight_paused) = true;
                  id(screensaver_display_off_active) = true;
                  id(screen_schedule_asleep) = true;
                  id(backlight_manual_off) = false;
                  id(manual_wake_ms) = 0;
                  return;
                }

                id(backlight_manual_off) = false;
                if (id(schedule_enabled).state && now.is_valid()) {
                  int on_hour = (int) id(schedule_on_hour).state;
                  int off_hour = (int) id(schedule_off_hour).state;
                  if (on_hour < 0) on_hour = 0;
                  if (on_hour > 23) on_hour = 23;
                  if (off_hour < 0) off_hour = 0;
                  if (off_hour > 23) off_hour = 23;

                  bool in_window = true;
                  if (on_hour < off_hour) {
                    in_window = now.hour >= on_hour && now.hour < off_hour;
                  } else if (on_hour > off_hour) {
                    in_window = now.hour >= on_hour || now.hour < off_hour;
                  }
                  id(manual_wake_ms) = in_window ? 0 : millis();
                } else {
                  id(manual_wake_ms) = 0;
                }

                id(backlight_paused) = false;
                id(screensaver_display_off_active) = false;
                id(screen_schedule_asleep) = false;
                id(last_photo_displayed_ms) = millis();
                if (was_off) {
                  ESP_LOGI("backlight", "Wake: restoring brightness");
                }
            - if:
                condition:
                  lambda: 'return id(schedule_enabled).state && !id(sntp_time).now().is_valid();'
                then:
                  - script.execute: backlight_schedule_display_off
                else:
                  - if:
                      condition:
                        lambda: 'return id(manual_wake_ms) != 0;'
                      then:
                        - script.execute: screen_schedule_wake_timeout_check
                      else:
                        - script.stop: screen_schedule_wake_timeout_check
                  - lvgl.resume:
                  - script.execute: screen_schedule_restore_page
                  - delay: 50ms
                  - script.execute: backlight_apply_brightness
                  - script.execute: immich_prefetch_chain

  # Backward-compatible script name used by older local call sites.
  - id: backlight_check_schedule
    mode: restart
    then:
      - script.execute: screen_schedule_check

  # Periodic brightness check (called from the unified 60s interval).
  - id: backlight_periodic_check
    mode: single
    then:
      - script.execute: screen_schedule_check
      - if:
          condition:
            lambda: 'return id(backlight_paused) && id(backlight).current_values.is_on();'
          then:
            - logger.log:
                level: WARN
                tag: backlight
                format: "Backlight was on while the screen should be asleep; forcing off"
            - script.execute: backlight_force_display_off
      - if:
          condition:
            lambda: |-
              if (!id(sunrise_sunset_valid) || id(backlight_paused)) return false;
              auto now = id(sntp_time).now();
              if (!now.is_valid()) return false;
              bool is_day = is_daytime(now.hour, now.minute,
                                       id(sunrise_hour), id(sunrise_minute),
                                       id(sunset_hour), id(sunset_minute));
              if (is_day != id(last_is_daytime)) {
                id(last_is_daytime) = is_day;
                return true;
              }
              return false;
          then:
            - script.execute: backlight_apply_brightness
      - if:
          condition:
            lambda: |-
              auto now = id(sntp_time).now();
              return now.is_valid() && now.hour == 0 && now.minute == 0;
          then:
            - script.execute: backlight_recalc_sunrise_sunset

# Keep the physical backlight off while schedule sleep or boot-time unknown-time
# guard is active, even if another route turns the light entity on.
interval:
  - interval: 500ms
    then:
      - if:
          condition:
            lambda: |-
              return id(screen_schedule_asleep) ||
                     id(backlight_manual_off) ||
                     (id(schedule_enabled).state && !id(sntp_time).now().is_valid());
          then:
            - script.execute: backlight_force_display_off
