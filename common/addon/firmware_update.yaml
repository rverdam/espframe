# =============================================================================
# FIRMWARE UPDATE - OTA and HTTP update from GitHub
# =============================================================================
# Provides OTA (over-the-air) and HTTP-based firmware updates. The device
# checks a manifest on GitHub (stable and optional beta) and can auto-update
# when new versions are available. Update checks run on an interval (hourly,
# daily, weekly, or monthly) when auto-update is enabled; a manual "Check for Update"
# button triggers an immediate check. Version is exposed as a text sensor for
# diagnostics.
#
# firmware_version: default for local builds; overridden by main config
# (e.g. factory.yaml) or by -s firmware_version when building releases.
# =============================================================================

substitutions:
  firmware_version: "dev"
  firmware_manifest_url: "https://jtenniswood.github.io/espframe/firmware/manifest.json"
  firmware_beta_manifest_url: "https://jtenniswood.github.io/espframe/firmware/beta/manifest.json"

esphome:
  project:
    name: rverdam.immich-frame
    version: "${firmware_version}"
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(firmware_update).set_source_url(id(firmware_manifest_url_text).state);
          id(firmware_update_beta).set_source_url(id(firmware_beta_manifest_url_text).state);
      - component.update: firmware_version_sensor

# -----------------------------------------------------------------------------
# State for update check interval
# -----------------------------------------------------------------------------
globals:
  - id: update_check_counter
    type: int
    initial_value: '0'
  - id: manual_check_only
    type: bool
    initial_value: 'false'
  - id: firmware_update_blank_active
    type: bool
    initial_value: 'false'

# -----------------------------------------------------------------------------
# OTA and HTTP update sources (stable + beta manifest)
# -----------------------------------------------------------------------------
ota:
  - platform: http_request

update:
  - platform: http_request
    id: firmware_update
    name: "Firmware: Update"
    internal: true
    source: ${firmware_manifest_url}
    update_interval: never
    on_update_available:
      then:
        - if:
            condition:
              lambda: 'return id(auto_update_switch).state && !id(manual_check_only);'
            then:
              - globals.set:
                  id: firmware_update_blank_active
                  value: 'true'
              - light.turn_off:
                  id: backlight
                  transition_length: 300ms
              - delay: 350ms
              - globals.set:
                  id: firmware_update_blank_active
                  value: 'false'
              - update.perform: firmware_update

  - platform: http_request
    id: firmware_update_beta
    name: "Firmware: Update Beta"
    internal: true
    source: ${firmware_beta_manifest_url}
    update_interval: never

# -----------------------------------------------------------------------------
# User controls: auto-update and check frequency
# -----------------------------------------------------------------------------
text:
  - platform: template
    name: "Firmware: Manifest URL"
    id: firmware_manifest_url_text
    internal: true
    entity_category: config
    # ESPFRAME:SETTING_FIELDS firmware_manifest_url START
    optimistic: false
    restore_value: true
    initial_value: "${firmware_manifest_url}"
    min_length: 0
    max_length: 255
    mode: text
    # ESPFRAME:SETTING_FIELDS firmware_manifest_url END
    icon: "mdi:web"
    web_server:
      sorting_group_id: sg_firmware
    set_action:
      - lambda: |-
          std::string url = strip_trailing_slashes(x);
          if (url.empty()) url = "${firmware_manifest_url}";
          if (!is_valid_http_url(url)) {
            ESP_LOGW("firmware", "Firmware manifest URL must be a valid http(s)://host[:port]/path URL");
            return;
          }
          id(firmware_manifest_url_text).publish_state(url);
          id(firmware_update).set_source_url(url);
          global_preferences->sync();
          ESP_LOGI("firmware", "Firmware manifest URL configured: %s", url.c_str());

  - platform: template
    name: "Firmware: Beta Manifest URL"
    id: firmware_beta_manifest_url_text
    internal: true
    entity_category: config
    # ESPFRAME:SETTING_FIELDS firmware_beta_manifest_url START
    optimistic: false
    restore_value: true
    initial_value: "${firmware_beta_manifest_url}"
    min_length: 0
    max_length: 255
    mode: text
    # ESPFRAME:SETTING_FIELDS firmware_beta_manifest_url END
    icon: "mdi:web"
    web_server:
      sorting_group_id: sg_firmware
    set_action:
      - lambda: |-
          std::string url = strip_trailing_slashes(x);
          if (url.empty()) url = "${firmware_beta_manifest_url}";
          if (!is_valid_http_url(url)) {
            ESP_LOGW("firmware", "Firmware beta manifest URL must be a valid http(s)://host[:port]/path URL");
            return;
          }
          id(firmware_beta_manifest_url_text).publish_state(url);
          id(firmware_update_beta).set_source_url(url);
          global_preferences->sync();
          ESP_LOGI("firmware", "Firmware beta manifest URL configured: %s", url.c_str());

switch:
  - platform: template
    name: "Firmware: Auto Update"
    id: auto_update_switch
    entity_category: config
    icon: "mdi:update"
    optimistic: true
    # ESPFRAME:SETTING_FIELDS auto_update START
    restore_mode: RESTORE_DEFAULT_ON
    # ESPFRAME:SETTING_FIELDS auto_update END
    web_server:
      sorting_group_id: sg_firmware

  - platform: template
    name: "Firmware: Beta Channel"
    id: beta_channel_switch
    entity_category: config
    icon: "mdi:beta"
    optimistic: true
    # ESPFRAME:SETTING_FIELDS beta_channel START
    restore_mode: RESTORE_DEFAULT_OFF
    # ESPFRAME:SETTING_FIELDS beta_channel END
    web_server:
      sorting_group_id: sg_firmware

select:
  - platform: template
    name: "Firmware: Update Frequency"
    id: update_frequency_select
    entity_category: config
    icon: "mdi:timer-outline"
    web_server:
      sorting_group_id: sg_firmware
    # ESPFRAME:SETTING_FIELDS update_frequency START
    options:
      - "Hourly"
      - "Daily"
      - "Weekly"
      - "Monthly"
    initial_option: "Daily"
    optimistic: true
    restore_value: true
    # ESPFRAME:SETTING_FIELDS update_frequency END

# -----------------------------------------------------------------------------
# Periodic update check (hourly / daily / weekly / monthly when auto-update on)
# -----------------------------------------------------------------------------
interval:
  - interval: 1h
    then:
      - lambda: |-
          if (!id(auto_update_switch).state) return;
          int counter = id(update_check_counter);
          std::string freq = id(update_frequency_select).current_option();
          int threshold = 24;
          if (freq == "Hourly") threshold = 1;
          else if (freq == "Weekly") threshold = 168;
          else if (freq == "Monthly") threshold = 720;
          if (counter % threshold == 0) {
            id(firmware_update).set_source_url(id(firmware_manifest_url_text).state);
            id(firmware_update).update();
            if (id(beta_channel_switch).state) {
              id(firmware_update_beta).set_source_url(id(firmware_beta_manifest_url_text).state);
              id(firmware_update_beta).update();
            }
          }
          id(update_check_counter) = counter + 1;

# -----------------------------------------------------------------------------
# Exposed version and manual check button
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Firmware: Version"
    id: firmware_version_sensor
    entity_category: diagnostic
    icon: "mdi:tag"
    web_server:
      sorting_group_id: sg_firmware
    update_interval: never
    lambda: 'return {"${firmware_version}"};'

button:
  - platform: template
    name: "Firmware: Check for Update"
    entity_category: config
    icon: "mdi:update"
    web_server:
      sorting_group_id: sg_firmware
    on_press:
      - lambda: 'id(manual_check_only) = true;'
      - lambda: |-
          id(firmware_update).set_source_url(id(firmware_manifest_url_text).state);
          id(firmware_update_beta).set_source_url(id(firmware_beta_manifest_url_text).state);
      - component.update: firmware_update
      - if:
          condition:
            lambda: 'return id(beta_channel_switch).state;'
          then:
            - component.update: firmware_update_beta
      - delay: 15s
      - lambda: 'id(manual_check_only) = false;'
