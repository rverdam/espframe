# =============================================================================
# HARDWARE CONFIGURATION - Guition ESP32-P4-JC8012P4A1
# =============================================================================
# Base device config: ESP32-P4 host, ESP32-C6 coprocessor (WiFi/BT over SDIO),
# PSRAM, display (MIPI DSI JC8012P4A1), touch (GSL3680), backlight, I2C. Also
# API, logger, web server, OTA, and espframe external components. Display is
# 800×1280 logical (rotation 90); OTA dims backlight before apply.
# =============================================================================

# -----------------------------------------------------------------------------
# Build and log
# -----------------------------------------------------------------------------
substitutions:
  espframe_component_url: "https://github.com/jtenniswood/espframe"
  espframe_component_ref: "main"
  log_level: "INFO"

esp32:
  variant: ESP32P4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_HTTPD_MAX_URI_LEN: "128"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"
    advanced:
      enable_idf_experimental_features: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    build_flags:
      - "-DCONFIG_COMPILER_OPTIMIZATION_PERF=y"
      - "-DLV_USE_BIDI=1"
      - "-DLV_USE_ARABIC_PERSIAN_CHARS=1"

# -----------------------------------------------------------------------------
# ESP32-C6 coprocessor (WiFi and Bluetooth via SDIO)
# -----------------------------------------------------------------------------
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# -----------------------------------------------------------------------------
# PSRAM (hex mode, 200 MHz)
# -----------------------------------------------------------------------------
psram:
  mode: hex
  speed: 200MHz

# -----------------------------------------------------------------------------
# API, logger, JSON, web server, OTA, debug (reset reason for crash diagnosis)
# -----------------------------------------------------------------------------
api:
  reboot_timeout: 0s

logger:
  level: ${log_level}
  logs:
    component: WARN
    remote_image: WARN
    immich: INFO
    warm: WARN
    accent: WARN

debug:
  update_interval: 60s

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"
      entity_category: diagnostic

json:

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: "https://jtenniswood.github.io/espframe/webserver/app.js"
  sorting_groups:
    - id: sg_connection
      name: "Connection"
      sorting_weight: 10
    - id: sg_photos
      name: "Photos"
      sorting_weight: 20
    - id: sg_device
      name: "Device"
      sorting_weight: 25
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 35
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 40
    - id: sg_developer
      name: "Developer"
      sorting_weight: 90

ota:
  - platform: esphome
    on_begin:
      then:
        - globals.set:
            id: firmware_update_blank_active
            value: 'true'
        - light.turn_off:
            id: backlight
            transition_length: 300ms
        - delay: 350ms
        - globals.set:
            id: firmware_update_blank_active
            value: 'false'

# -----------------------------------------------------------------------------
# External components (espframe: gsl3680, remote_image, espframe)
# -----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: ${espframe_component_url}
      ref: ${espframe_component_ref}
      path: components
    components: [gsl3680, remote_image, espframe]
    refresh: 0s

espframe:
  id: espframe_core

# -----------------------------------------------------------------------------
# DSI PHY power rail, backlight output, I2C
# -----------------------------------------------------------------------------
esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true

output:
  - platform: ledc
    id: backlight_output
    pin: GPIO23

i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz
    sda_pullup_enabled: false
    scl_pullup_enabled: false

# -----------------------------------------------------------------------------
# MIPI DSI display (JC8012P4A1, 800×1280, rotation 90)
# -----------------------------------------------------------------------------
display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: tft_display
    reset_pin: GPIO27
    auto_clear_enabled: false
    update_interval: never
    color_order: RGB
    dimensions:
      width: 800
      height: 1280

# -----------------------------------------------------------------------------
# Touch (GSL3680, transform for orientation)
# -----------------------------------------------------------------------------
touchscreen:
  - platform: gsl3680
    id: tft_touch
    display: tft_display
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: false
    on_touch:
      - script.execute: backlight_wake
    on_update:
      - lambda: |-
          if (!id(developer_features_enabled).state) return;
          if (touches.empty()) return;
          const auto &touch = touches.front();
          auto map_visible = [](int x, int y, int &screen_x, int &screen_y) {
            const std::string rotation = id(screen_rotation_select).current_option();
            if (rotation == "90") {
              screen_x = ${display_height} - y;
              screen_y = x;
            } else if (rotation == "180") {
              screen_x = ${display_width} - x;
              screen_y = ${display_height} - y;
            } else if (rotation == "270") {
              screen_x = y;
              screen_y = ${display_width} - x;
            } else {
              screen_x = x;
              screen_y = y;
            }
          };
          if (id(photo_source_menu_open)) {
            if (id(photo_source_swipe_triggered) || id(photo_source_menu_touch_handled)) return;
            auto hit_at = [&](lv_obj_t *obj, int x, int y) -> bool {
              lv_area_t coords;
              lv_obj_get_coords(obj, &coords);
              return x >= coords.x1 && x <= coords.x2 && y >= coords.y1 && y <= coords.y2;
            };
            int mapped_x, mapped_y;
            map_visible(touch.x, touch.y, mapped_x, mapped_y);
            auto hit = [&](lv_obj_t *obj) -> bool {
              return hit_at(obj, touch.x, touch.y) || hit_at(obj, mapped_x, mapped_y);
            };
            if (hit(id(photo_source_menu_close_label))) {
              id(photo_source_menu_touch_handled) = true;
              id(close_photo_source_menu).execute();
              return;
            }
            if (hit(id(photo_source_all_row))) {
              id(photo_source_menu_selection_index) = 0;
            } else if (hit(id(photo_source_favorites_row))) {
              id(photo_source_menu_selection_index) = 1;
            } else if (hit(id(photo_source_album_row))) {
              id(photo_source_menu_selection_index) = 2;
            } else if (hit(id(photo_source_person_row))) {
              id(photo_source_menu_selection_index) = 3;
            } else if (hit(id(photo_source_memories_row))) {
              id(photo_source_menu_selection_index) = 4;
            } else {
              return;
            }
            id(photo_source_menu_touch_handled) = true;
            id(select_photo_source_from_menu).execute();
            return;
          }
          if (id(photo_source_swipe_triggered)) return;
          int start_x, start_y, current_x, current_y;
          map_visible(touch.x_org, touch.y_org, start_x, start_y);
          map_visible(touch.x, touch.y, current_x, current_y);
          const int dy = current_y - start_y;
          const int dx = std::abs(current_x - start_x);
          if (start_y <= 140 && dy >= 110 && dx <= 220) {
            id(photo_source_swipe_triggered) = true;
            id(show_photo_source_menu).execute();
          }
    on_release:
      - lambda: |-
          id(photo_source_swipe_triggered) = false;
          id(photo_source_menu_touch_handled) = false;
