# =============================================================================
# PACKAGES - ESPHome include manifest (Guition ESP32-P4 JC8012P4A1)
# =============================================================================
# Device-specific substitutions followed by the package wiring. Shared addons
# live in common/addon/ and are referenced via ../../common/addon/; device-local
# configs (hardware, screens, assets) stay under this folder.
# =============================================================================

substitutions:
  display_width: "1280"
  display_height: "800"
  portrait_display_width: "800"
  portrait_display_height: "1280"
  portrait_metadata_width: "710"
  portrait_half_width: "640"
  screen_rotation: "0"
  screen_rotation_0: "90"
  screen_rotation_90: "180"
  screen_rotation_180: "270"
  screen_rotation_270: "0"
  captive_portal_ip: "192.168.4.1"
  firmware_manifest_url: "https://rverdam.github.io/espframe/firmware/manifest.json"
  firmware_beta_manifest_url: "https://rverdam.github.io/espframe/firmware/beta/manifest.json"

packages:
  # ---------------------------------------------------------------------------
  # Device, assets, and LVGL base
  # ---------------------------------------------------------------------------
  device:          !include device/device.yaml
  fonts:           !include assets/fonts.yaml
  icons:           !include assets/icons.yaml
  lvgl_base:       !include device/lvgl_base.yaml
  screen_rotation: !include ../../common/addon/screen_rotation.yaml
  # ---------------------------------------------------------------------------
  # Shared addons: connectivity and Immich config/filter
  # ---------------------------------------------------------------------------
  connectivity:    !include ../../common/addon/connectivity.yaml
  immich_config:   !include ../../common/addon/immich_config.yaml
  immich_filter:   !include ../../common/addon/immich_filter.yaml
  # ---------------------------------------------------------------------------
  # Shared addons: backlight, time, display effects
  # ---------------------------------------------------------------------------
  backlight:       !include ../../common/addon/backlight.yaml
  backlight_sched: !include ../../common/addon/backlight_schedule.yaml
  time_sync:       !include ../../common/addon/time.yaml
  accent_color:    !include ../../common/addon/accent_color.yaml
  warm_tones:      !include ../../common/addon/warm_tones.yaml
  # ---------------------------------------------------------------------------
  # Screens (loading, WiFi setup, Immich setup, slideshow)
  # ---------------------------------------------------------------------------
  screen_loading:  !include device/screen_loading.yaml
  screen_wifi:     !include device/screen_wifi_setup.yaml
  screen_setup:    !include device/screen_immich_setup.yaml
  immich_api:      !include ../../common/addon/immich_api.yaml
  immich_slide:    !include ../../common/addon/immich_slideshow.yaml
  screen_slide:    !include device/screen_slideshow.yaml
  # ---------------------------------------------------------------------------
  # Shared addons: firmware update and network diagnostics
  # ---------------------------------------------------------------------------
  fw_update:       !include ../../common/addon/firmware_update.yaml
  dev_features:    !include ../../common/addon/developer_features.yaml
  network:         !include ../../common/addon/network.yaml
