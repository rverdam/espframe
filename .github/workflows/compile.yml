name: Compile Check

on:
  pull_request:
    paths:
      - "components/**"
      - "common/**"
      - "devices/guition-esp32-p4-jc8012p4a1/**"
      - "builds/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "product/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Generated Files and Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run local checks
        run: npm run check:all

  compile:
    name: Compile Firmware
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Compile 10-inch P4 firmware
        run: >-
          docker run --rm
          -v "${PWD}:/config"
          ghcr.io/esphome/esphome:2026.5.0
          compile /config/builds/guition-esp32-p4-jc8012p4a1.factory.yaml
