name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-metadata:
    name: Read Product Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_matrix: ${{ steps.product.outputs.release_matrix }}
      device_slugs: ${{ steps.product.outputs.device_slugs }}
      esphome_docker_image: ${{ steps.product.outputs.esphome_docker_image }}
      esphome_version: ${{ steps.product.outputs.esphome_version }}
      esphome_config_mount: ${{ steps.product.outputs.esphome_config_mount }}
      esphome_docker_remove_flag: ${{ steps.product.outputs.esphome_docker_remove_flag }}
      release_esphome_cache_dir: ${{ steps.product.outputs.release_esphome_cache_dir }}
      release_esphome_cache_key_prefix: ${{ steps.product.outputs.release_esphome_cache_key_prefix }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          sparse-checkout: |
            scripts/product_config.py
            product/espframe.json
          sparse-checkout-cone-mode: false

      - name: Read product metadata
        id: product
        run: python3 scripts/product_config.py github-output >> "$GITHUB_OUTPUT"

  release-notes:
    name: Update Release Notes
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build detailed changelog
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: python3 scripts/release_changelog.py "$VERSION" --output "$RUNNER_TEMP/release-notes.md"

      - name: Update GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.event.release.tag_name }}
        run: gh release edit "$VERSION" --notes-file "$RUNNER_TEMP/release-notes.md"

  build-firmware:
    name: Build ${{ matrix.slug }}
    needs: release-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ESPHOME_DOCKER_IMAGE: ${{ needs.release-metadata.outputs.esphome_docker_image }}
      ESPHOME_VERSION: ${{ needs.release-metadata.outputs.esphome_version }}
      ESPHOME_CONFIG_MOUNT: ${{ needs.release-metadata.outputs.esphome_config_mount }}
      ESPHOME_DOCKER_REMOVE_FLAG: ${{ needs.release-metadata.outputs.esphome_docker_remove_flag }}
      RELEASE_ESPHOME_CACHE_DIR: ${{ needs.release-metadata.outputs.release_esphome_cache_dir }}
      RELEASE_ESPHOME_CACHE_KEY_PREFIX: ${{ needs.release-metadata.outputs.release_esphome_cache_key_prefix }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-metadata.outputs.release_matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Cache ESPHome build
        uses: actions/cache@v5
        with:
          path: ${{ needs.release-metadata.outputs.release_esphome_cache_dir }}
          key: ${{ needs.release-metadata.outputs.release_esphome_cache_key_prefix }}-${{ matrix.slug }}-${{ hashFiles('builds/*.yaml', 'common/**', 'devices/**', 'components/**') }}
          restore-keys: |
            ${{ needs.release-metadata.outputs.release_esphome_cache_key_prefix }}-${{ matrix.slug }}-

      - name: Compile firmware
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          python3 scripts/firmware_release.py inject \
            --slug "${{ matrix.slug }}" \
            --version "${VERSION}"

          docker run ${ESPHOME_DOCKER_REMOVE_FLAG} \
            -v "${PWD}:${ESPHOME_CONFIG_MOUNT}" \
            "${ESPHOME_DOCKER_IMAGE}:${ESPHOME_VERSION}" \
            compile "${ESPHOME_CONFIG_MOUNT}/builds/${{ matrix.yaml }}.factory.yaml"

          BUILD_DIR="${RELEASE_ESPHOME_CACHE_DIR}/build/${{ matrix.build_name }}/.pioenvs/${{ matrix.build_name }}"
          mkdir -p output
          if [ ! -f "${BUILD_DIR}/firmware.factory.bin" ]; then
            echo "::error::Firmware compilation failed - factory binary not found"
            exit 1
          fi
          sudo cp "${BUILD_DIR}/firmware.factory.bin" "output/${{ matrix.slug }}.factory.bin"

          docker run ${ESPHOME_DOCKER_REMOVE_FLAG} \
            -v "${PWD}:${ESPHOME_CONFIG_MOUNT}" \
            "${ESPHOME_DOCKER_IMAGE}:${ESPHOME_VERSION}" \
            -s firmware_version "${VERSION}" \
            compile "${ESPHOME_CONFIG_MOUNT}/builds/${{ matrix.yaml }}.yaml"

      - name: Fix ESPHome cache permissions
        if: always()
        run: |
          if [ -d "${RELEASE_ESPHOME_CACHE_DIR}" ]; then
            sudo chown -R "$USER:$USER" "${RELEASE_ESPHOME_CACHE_DIR}"
            chmod -R u+rwX "${RELEASE_ESPHOME_CACHE_DIR}"
          fi

      - name: Collect firmware files and generate manifest
        env:
          VERSION: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          BUILD_DIR="${RELEASE_ESPHOME_CACHE_DIR}/build/${{ matrix.build_name }}/.pioenvs/${{ matrix.build_name }}"
          mkdir -p output

          if [ ! -f "${BUILD_DIR}/firmware.bin" ]; then
            echo "::error::Firmware compilation failed - OTA binary not found"
            exit 1
          fi

          sudo cp "${BUILD_DIR}/firmware.bin" "output/${{ matrix.slug }}.ota.bin"

          python3 scripts/firmware_release.py manifest \
            --slug "${{ matrix.slug }}" \
            --chip "${{ matrix.chip }}" \
            --version "${VERSION}" \
            --factory "output/${{ matrix.slug }}.factory.bin" \
            --ota "output/${{ matrix.slug }}.ota.bin" \
            --out "output/${{ matrix.slug }}.manifest.json"

          python3 scripts/firmware_release.py verify-files \
            --slug "${{ matrix.slug }}" \
            --version "${VERSION}" \
            --manifest "output/${{ matrix.slug }}.manifest.json" \
            --factory "output/${{ matrix.slug }}.factory.bin" \
            --ota "output/${{ matrix.slug }}.ota.bin"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.slug }}
          path: output/

  publish:
    name: Publish to Release
    if: github.event_name == 'release'
    needs: [build-firmware, release-metadata]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/firmware_release.py
            scripts/product_config.py
            product/espframe.json
          sparse-checkout-cone-mode: false

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware

      - name: Verify assembled release assets
        env:
          VERSION: ${{ github.event.release.tag_name }}
          DEVICE_SLUGS: ${{ needs.release-metadata.outputs.device_slugs }}
        run: >-
          python3 scripts/firmware_release.py verify-directory
          --version "${VERSION}"
          --dir firmware
          --slugs $DEVICE_SLUGS

      - name: Upload firmware to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ github.event.release.tag_name }}" firmware/* --clobber

      - name: Verify uploaded release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ github.event.release.tag_name }}
          DEVICE_SLUGS: ${{ needs.release-metadata.outputs.device_slugs }}
        run: |
          mkdir -p published
          gh release download "${VERSION}" \
            --pattern "*.manifest.json" \
            --pattern "*.factory.bin" \
            --pattern "*.ota.bin" \
            --dir published
          python3 scripts/firmware_release.py verify-directory \
            --version "${VERSION}" \
            --dir published \
            --slugs $DEVICE_SLUGS
